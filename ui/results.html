<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Search Results - {{.Query}}</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .result { margin-bottom: 20px; }
        .url { color: green; font-size: 14px; }
        .title { font-size: 18px; color: blue; text-decoration: none; }
        .title:hover { text-decoration: underline; }
        .score { font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <form action="/search" method="get">
        <input type="text" name="q" value="{{.Query}}" placeholder="Search..." required />
        <input type="submit" value="Search" />
    </form>
    <hr>
    <h2>Results for "{{.Query}}"</h2>
    {{if .Results}}
        {{range .Results}}
            <div class="result">
                <div><a href="{{.URL}}" class="title">{{.Title}}</a></div>
                <div class="url">{{.URL}}</div>
                <div class="score">Score: {{.Score}}</div>
            </div>
        {{end}}
    {{else}}
        <p>No results found.</p>
    {{end}}
</body>
</html>
